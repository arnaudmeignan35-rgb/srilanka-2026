    // ─── STATE ──────────────────────────────────────────────────────────────

    const AppContext = createContext(null);

    function loadLS(key, def) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
    }
    function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

    function AppProvider({ children }) {
      const [isAuth, setIsAuth] = useState(() => loadLS('sl_auth', false));
      const [currentUser, setCurrentUser] = useState(() => loadLS('sl_user', null));
      const [messages, setMessages] = useState(() => loadLS('sl_msgs', []));
      const [page, setPage] = useState('map');
      const [pendingDay, setPendingDay] = useState(null);

      const login = (pwd) => {
        if (pwd === TRIP_PASSWORD) {
          setIsAuth(true); saveLS('sl_auth', true); return true;
        }
        return false;
      };

      const chooseUser = (u) => { setCurrentUser(u); saveLS('sl_user', u); };

      const sendMessage = (msg) => {
        const m = { ...msg, id: crypto.randomUUID(), timestamp: Date.now() };
        setMessages(prev => {
          const next = [...prev, m];
          saveLS('sl_msgs', next);
          return next;
        });
      };

      const completeTask = (id) => {
        setMessages(prev => {
          const next = prev.map(m => m.id === id && m.task ? { ...m, task: { ...m.task, completed: true } } : m);
          saveLS('sl_msgs', next);
          return next;
        });
      };

      const logout = () => { setIsAuth(false); setCurrentUser(null); saveLS('sl_auth', false); saveLS('sl_user', null); };

      return (
        <AppContext.Provider value={{ isAuth, currentUser, messages, page, setPage, pendingDay, setPendingDay, login, chooseUser, sendMessage, completeTask, logout }}>
          {children}
        </AppContext.Provider>
      );
    }

    // ─── MAP PAGE ────────────────────────────────────────────────────────────

    // Group consecutive days into stages by location.
    // Skips the Paris CDG departure day so the map only shows Sri Lanka stops.
    function buildStages() {
      const result = [];
      TRIP.days.forEach(day => {
        const [lat, lng] = day.coordinates;
        // Filter out non-Sri Lanka points (e.g. Paris CDG)
        if (lat < 5 || lat > 10 || lng < 79 || lng > 82) return;
        const last = result[result.length - 1];
        if (last && last.location === day.location) {
          last.days.push(day);
        } else {
          result.push({
            location: day.location,
            coordinates: day.coordinates,
            days: [day],
          });
        }
      });
      return result.map((s, i) => ({ ...s, stageNumber: i + 1 }));
    }

    const STAGE_COLORS = ['#1C3D5A','#9B59B6','#4A9DB5','#2A6041','#C8923A','#D4622A','#B5537A','#2A6041','#1C3D5A'];

    function MapPage() {
      const { setPage, setPendingDay } = useApp();
      const mapRef = useRef(null);
      const leafletRef = useRef(null);
      const markersRef = useRef([]);
      const [selectedStage, setSelectedStage] = useState(null);

      const stages = useMemo(() => buildStages(), []);
      const selected = stages.find(s => s.stageNumber === selectedStage);

      useEffect(() => {
        if (!mapRef.current || leafletRef.current) return;

        const map = L.map(mapRef.current, { zoomControl:false, attributionControl:false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '© OpenStreetMap © CARTO', maxZoom: 19
        }).addTo(map);
        // Fit Sri Lanka
        map.fitBounds([[5.9, 79.6], [9.9, 81.9]], { padding: [40, 40] });
        leafletRef.current = map;

        // Route polyline through stages
        const route = stages.map(s => s.coordinates);
        L.polyline(route, { color:'#C8923A', weight:2.5, dashArray:'6 8', opacity:0.75 }).addTo(map);

        // Stage markers
        stages.forEach((stage, idx) => {
          const color = STAGE_COLORS[idx % STAGE_COLORS.length];
          const dayLabel = stage.days.length > 1
            ? `J${stage.days[0].number}-${stage.days[stage.days.length-1].number}`
            : `J${stage.days[0].number}`;
          const icon = L.divIcon({
            className: '',
            html: `<div style="background:${color};color:white;border:2.5px solid white;border-radius:24px;padding:5px 10px;font-family:Inter,sans-serif;font-weight:700;font-size:12px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.3);text-align:center;line-height:1.1">
              <div style="font-size:13px">${dayLabel}</div>
              <div style="font-size:9px;font-weight:500;opacity:.85;margin-top:1px">${stage.location}</div>
            </div>`,
            iconSize: null, iconAnchor: [40, 18]
          });
          const marker = L.marker(stage.coordinates, { icon }).addTo(map);
          marker.on('click', () => setSelectedStage(stage.stageNumber));
          markersRef.current.push({ marker, stageNumber: stage.stageNumber, color });
        });

        return () => { map.remove(); leafletRef.current = null; markersRef.current = []; };
      }, []);

      // Fly to selected stage
      useEffect(() => {
        if (!leafletRef.current) return;
        if (selected) {
          leafletRef.current.flyTo(selected.coordinates, 9, { duration: 0.8 });
        } else {
          leafletRef.current.fitBounds([[5.9, 79.6], [9.9, 81.9]], { padding: [40, 40] });
        }
      }, [selectedStage]);

      const goToDay = (dayNum) => {
        setPendingDay(dayNum);
        setPage('timeline');
      };

      return (
        <div className="h-full relative">
          <div ref={mapRef} className="h-full w-full" />

          {/* Selected stage panel */}
          {selected ? (
            <div className="absolute bottom-0 left-0 right-0 rounded-t-3xl p-5 pb-4 page-enter" style={{ background:'white', boxShadow:'0 -4px 30px rgba(0,0,0,0.15)', zIndex:1000 }}>
              <div className="flex items-start justify-between mb-3">
                <div className="flex-1 min-w-0">
                  <p className="text-[11px] uppercase tracking-wider" style={{ color: STAGE_COLORS[(selected.stageNumber-1) % STAGE_COLORS.length], fontFamily:'Inter', fontWeight:600 }}>
                    Étape {selected.stageNumber} · {selected.days.length} jour{selected.days.length>1?'s':''}
                  </p>
                  <h2 className="font-display text-2xl font-semibold leading-tight" style={{ color:'#1C3D5A' }}>
                    {selected.location}
                  </h2>
                  <p className="text-xs text-gray-400 mt-0.5" style={{ fontFamily:'Inter' }}>
                    Du {new Date(selected.days[0].date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}
                    {selected.days.length>1 && ` au ${new Date(selected.days[selected.days.length-1].date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}`}
                  </p>
                </div>
                <button onClick={() => setSelectedStage(null)}
                  className="w-8 h-8 rounded-full flex items-center justify-center text-sm shrink-0"
                  style={{ background:'#F3F4F6', color:'#6B7280' }}>✕</button>
              </div>

              <p className="text-[11px] text-gray-400 mb-2" style={{ fontFamily:'Inter' }}>
                Touche un jour pour voir le détail :
              </p>
              <div className="flex flex-col gap-2 max-h-64 overflow-y-auto scrollable">
                {selected.days.map(day => (
                  <button
                    key={day.number}
                    onClick={() => goToDay(day.number)}
                    className="w-full text-left flex items-center gap-3 px-3 py-2.5 rounded-xl active:scale-[0.98] transition-transform"
                    style={{ background:'#F9F4EC', border:'1px solid #EBE3D2' }}
                  >
                    <div className="w-9 h-9 rounded-full flex items-center justify-center shrink-0"
                      style={{ background: STAGE_COLORS[(selected.stageNumber-1) % STAGE_COLORS.length] }}>
                      <span className="text-white text-xs font-bold" style={{ fontFamily:'Inter' }}>J{day.number}</span>
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-[11px] text-gray-400 uppercase tracking-wider" style={{ fontFamily:'Inter' }}>
                        {new Date(day.date).toLocaleDateString('fr-FR',{weekday:'short', day:'numeric', month:'short'})}
                      </p>
                      <p className="text-sm font-semibold leading-tight truncate" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>
                        {day.title}
                      </p>
                    </div>
                    <span className="text-gray-400 shrink-0">→</span>
                  </button>
                ))}
              </div>
            </div>
          ) : (
            <div className="absolute bottom-0 left-0 right-0 p-3" style={{ zIndex:1000 }}>
              <div className="rounded-2xl p-3" style={{ background:'rgba(255,255,255,0.94)', backdropFilter:'blur(12px)', boxShadow:'0 4px 20px rgba(0,0,0,0.1)' }}>
                <p className="text-[11px] text-gray-400 text-center uppercase tracking-wider mb-2" style={{ fontFamily:'Inter' }}>
                  Les {stages.length} étapes du voyage
                </p>
                <div className="flex gap-2 overflow-x-auto scrollable pb-1">
                  {stages.map((s, idx) => {
                    const color = STAGE_COLORS[idx % STAGE_COLORS.length];
                    const dayLabel = s.days.length > 1
                      ? `J${s.days[0].number}-${s.days[s.days.length-1].number}`
                      : `J${s.days[0].number}`;
                    return (
                      <button key={s.stageNumber} onClick={() => setSelectedStage(s.stageNumber)}
                        className="shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl"
                        style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }}>
                        <span className="px-2 py-0.5 rounded-full text-white text-[10px] font-bold"
                          style={{ background: color, fontFamily:'Inter' }}>
                          {dayLabel}
                        </span>
                        <span className="text-[10px] text-gray-500 whitespace-nowrap" style={{ fontFamily:'Inter' }}>{s.location}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

                        <div>
                          {day.activities.map((a, i) => (
                            <ActivityRow key={a.id} activity={a} isLast={i === day.activities.length - 1} />
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    function ActivityRow({ activity, isLast }) {

      return (
        <div className="flex gap-3">
          <div className="flex flex-col items-center" style={{ paddingTop:14 }}>

              <p className="text-[11px] text-gray-400 flex items-center gap-1 mb-0.5" style={{ fontFamily:'Inter' }}>

            <p className="text-xs leading-relaxed mt-0.5" style={{ color:'#6B7280', fontFamily:'Inter' }}>{activity.description}</p>

              {activity.notes && (
                <span className="text-[11px] px-2 py-0.5 rounded-full" style={{ color:'#1C3D5A', background:'#1C3D5A12', fontFamily:'Inter' }}>
                  ℹ️ {activity.notes}
                </span>
              )}
            </div>
          </div>
        </div>
      );

    // ─── HOTELS PAGE ─────────────────────────────────────────────────────────

    function HotelsPage() {
      return (
        <div className="scrollable h-full" style={{ background:'#F9F4EC' }}>
          <div className="px-4 pt-5 pb-6 flex flex-col gap-4">
            {TRIP.hotels.map(hotel => {
              const ci = new Date(hotel.checkIn).toLocaleDateString('fr-FR', { day:'numeric', month:'long' });

              return (
                <div key={hotel.id} className="rounded-2xl overflow-hidden card-shadow" style={{ background:'white' }}>
                  <div className="h-1.5" style={{ background:'linear-gradient(90deg, #1C3D5A, #C8923A, #2A6041)' }} />
                  <div className="p-4">
                    <div className="flex items-start gap-3 mb-3">
                      {hotel.image && (
                        <div className="shrink-0 rounded-xl overflow-hidden" style={{ width:'88px', height:'88px', background:'#1C3D5A' }}>
                          <img
                            src={hotel.image}
                            alt={hotel.name}
                            loading="lazy"
                            onError={(e) => { e.currentTarget.style.display = 'none'; }}
                            style={{ width:'100%', height:'100%', objectFit:'cover', display:'block' }}
                          />
                        </div>
                      )}
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2 mb-1">
                          <div className="flex gap-0.5">
                            {Array.from({length:hotel.stars}).map((_,i) => <span key={i} style={{color:'#C8923A',fontSize:11}}>★</span>)}
                          </div>
                          <div className="shrink-0 rounded-lg px-2 py-0.5 text-center" style={{ background:'#1C3D5A18' }}>
                            <span className="font-bold text-xs" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>
                              J{hotel.dayNumbers[0]}{hotel.dayNumbers.length > 1 ? `–${hotel.dayNumbers[hotel.dayNumbers.length-1]}` : ''}

                          </div>
                        </div>
                        <h3 className="font-display text-xl font-semibold leading-tight" style={{ color:'#1C3D5A' }}>{hotel.name}</h3>
                        <p className="text-xs text-gray-400 flex items-center gap-1 mt-0.5" style={{ fontFamily:'Inter' }}>
                          📍 {hotel.location}
                        </p>
                      </div>
                    </div>

                    <div className="flex items-center gap-3 rounded-xl px-3 py-2.5 mb-3" style={{ background:'#F9F4EC' }}>
                      <span>🗓️</span>
                      <div className="flex items-center gap-2 text-sm" style={{ fontFamily:'Inter' }}>
                        <span className="font-semibold" style={{ color:'#1C3D5A' }}>{ci}</span>
                        <span className="text-gray-400">→</span>

                    {hotel.notes && (
                      <div className="rounded-xl px-3 py-2 mb-3" style={{ background:'#F5E8D0' }}>

                      </div>
                    )}
                    {hotel.confirmationNumber && (
                      <div className="flex items-center gap-2 rounded-xl px-3 py-2" style={{ background:'#D4EDE0' }}>
                        <span className="text-xs font-semibold" style={{ color:'#2A6041', fontFamily:'Inter' }}>N° réservation :</span>
                        <span className="text-xs font-mono" style={{ color:'#2A6041' }}>{hotel.confirmationNumber}</span>
                      </div>

    // ─── FLIGHTS PAGE ────────────────────────────────────────────────────────

      const ret = TRIP.flights.find(f => f.isReturn);

              <div className="flex-1 h-px" style={{ background:'#E5E7EB' }} />

                { icon:'⏰', text:'Arriver 3h avant le départ à CDG (Terminal 1)' },

                { icon:'💰', text:'Monnaie : Roupie Sri-lankaise (LKR). 1 EUR ≈ 330 LKR' },

              ].map((tip,i) => (
                <div key={i} className="flex items-start gap-3 mb-2">

                </div>

            </div>
          </div>
        </div>

    function FlightCard({ flight, label, color }) {
      const fmtDate = d => new Date(d).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
      const fmtTime = d => new Date(d).toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      const [showSeats, setShowSeats] = useState(false);

      return (
        <div className="rounded-2xl overflow-hidden card-shadow" style={{ background:'white' }}>
          <div className="px-4 py-3 flex items-center justify-between" style={{ background:color }}>
            <div className="flex items-center gap-2">
              <span className="text-white text-lg">{flight.isReturn ? '🔄' : '✈️'}</span>
              <span className="font-semibold text-white" style={{ fontFamily:'Inter' }}>{label}</span>
            </div>
            <span className="text-sm" style={{ color:'rgba(255,255,255,0.75)', fontFamily:'Inter' }}>{flight.airline}</span>
          </div>
          <div className="p-4">
            {/* Overall summary */}
            <div className="flex items-center gap-3 mb-3">
              <div className="flex-1 text-center">
                <p className="text-3xl font-bold" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>{flight.fromCode}</p>
                <p className="text-xs text-gray-400 mt-1" style={{ fontFamily:'Inter' }}>{flight.from}</p>
              </div>
              <div className="flex flex-col items-center gap-1">
                <div className="flex items-center gap-1">
                  <div className="w-2 h-2 rounded-full border-2 border-gray-300" />
                  <div className="w-8 h-px bg-gray-300" />
                  <span className="text-[10px] px-1.5 py-0.5 rounded" style={{ background:'#F5E8D0', color:'#C8923A', fontFamily:'Inter', fontWeight:600 }}>DOH</span>
                  <div className="w-8 h-px bg-gray-300" />
                  <div className="w-2 h-2 rounded-full border-2 border-gray-300" />
                </div>
                <span className="text-[11px] text-gray-400" style={{ fontFamily:'Inter' }}>⏱ {flight.duration}</span>
              </div>
              <div className="flex-1 text-center">
                <p className="text-3xl font-bold" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>{flight.toCode}</p>
                <p className="text-xs text-gray-400 mt-1" style={{ fontFamily:'Inter' }}>{flight.to}</p>
              </div>
            </div>

            {/* Legs */}
            {flight.legs && (
              <div className="flex flex-col gap-2 mb-3">
                {flight.legs.map((leg, i) => (
                  <div key={i} className="rounded-xl px-3 py-2.5" style={{ background:'#F9F4EC' }}>
                    <div className="flex items-center justify-between mb-1.5">
                      <span className="text-xs font-semibold px-2 py-0.5 rounded" style={{ color:'white', background:color, fontFamily:'Inter' }}>{leg.flight}</span>
                      <span className="text-[10px] text-gray-400" style={{ fontFamily:'Inter' }}>{leg.aircraft} · {leg.cabin}</span>
                    </div>
                    <div className="flex items-center justify-between">
                      <div>
                        <p className="text-base font-bold leading-none" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>{fmtTime(leg.dep)}</p>
                        <p className="text-[10px] text-gray-500 mt-0.5" style={{ fontFamily:'Inter' }}>{leg.from} · {leg.fromCity}</p>
                      </div>
                      <div className="flex flex-col items-center">
                        <span className="text-[10px] text-gray-400" style={{ fontFamily:'Inter' }}>{leg.duration}</span>
                        <div className="text-xs" style={{ color:'#C8923A' }}>→</div>
                      </div>
                      <div className="text-right">
                        <p className="text-base font-bold leading-none" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>{fmtTime(leg.arr)}</p>
                        <p className="text-[10px] text-gray-500 mt-0.5" style={{ fontFamily:'Inter' }}>{leg.to} · {leg.toCity}</p>
                      </div>
                    </div>
                    <p className="text-[10px] text-gray-400 mt-1" style={{ fontFamily:'Inter' }}>{fmtDate(leg.dep)}</p>
                  </div>
                ))}
              </div>
            )}

            {/* Tags */}
            <div className="flex flex-wrap gap-2 mb-2">
              {flight.confirmationCode && (
                <span className="text-xs px-3 py-1 rounded-full font-mono" style={{ color:'#2A6041', background:'#D4EDE0', fontFamily:'Inter' }}>
                  📋 PNR {flight.confirmationCode}
                </span>
              )}
              {flight.notes && <span className="text-xs px-3 py-1 rounded-full" style={{ color:'#6B7280', background:'#F3F4F6', fontFamily:'Inter' }}>ℹ️ {flight.notes}</span>}
            </div>

            {/* Seats toggle */}
            {flight.seats && (
              <>
                <button
                  onClick={() => setShowSeats(!showSeats)}
                  className="w-full mt-2 rounded-xl px-3 py-2 flex items-center justify-between"
                  style={{ background:'#1C3D5A0F', color:'#1C3D5A', fontFamily:'Inter' }}
                >
                  <span className="text-xs font-semibold">💺 Sièges de la famille</span>
                  <span className="text-xs">{showSeats ? '▲' : '▼'}</span>
                </button>
                {showSeats && (
                  <div className="mt-2 rounded-xl p-3" style={{ background:'#F9F4EC' }}>
                    <div className="grid grid-cols-3 gap-2 text-[11px]" style={{ fontFamily:'Inter' }}>
                      <div className="font-semibold" style={{ color:'#6B7280' }}>Famille</div>
                      <div className="font-semibold text-center" style={{ color:'#6B7280' }}>{flight.legs?.[0]?.flight || 'Vol 1'}</div>
                      <div className="font-semibold text-center" style={{ color:'#6B7280' }}>{flight.legs?.[1]?.flight || 'Vol 2'}</div>
                      {flight.seats.map((s, i) => (
                        <React.Fragment key={i}>
                          <div style={{ color:'#1C3D5A', fontWeight:500 }}>{s.name}</div>
                          <div className="text-center font-mono" style={{ color:'#1C3D5A' }}>{s.leg1}</div>
                          <div className="text-center font-mono" style={{ color:'#1C3D5A' }}>{s.leg2}</div>
                        </React.Fragment>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ─── CHAT PAGE ───────────────────────────────────────────────────────────

    function ChatPage() {
      const { messages, sendMessage, completeTask, currentUser } = useApp();
      const [text, setText] = useState('');
      const [taskMode, setTaskMode] = useState(false);
      const [taskAssignee, setTaskAssignee] = useState(null);
      const [showTasks, setShowTasks] = useState(false);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior:'smooth' });
      }, [messages]);

      const myTasks = messages.filter(m => m.task && !m.task.completed && m.task.assignedToId === currentUser?.id);

      const handleSend = () => {
        const t = text.trim();
        if (!t || !currentUser) return;
        sendMessage({
          authorId: currentUser.id,
          authorName: currentUser.name,
          authorColor: currentUser.color,
          text: t,
          ...(taskMode && taskAssignee ? { task: { assignedToId: taskAssignee.id, assignedToName: taskAssignee.name, title: t, completed: false } } : {})
        });
        setText('');
        setTaskMode(false);
        setTaskAssignee(null);
      };

      if (!currentUser) return null;

      return (
        <div className="flex flex-col h-full" style={{ background:'#F9F4EC' }}>

          {/* My tasks banner */}
          {myTasks.length > 0 && (
            <button onClick={() => setShowTasks(!showTasks)}
              className="flex items-center gap-2 px-4 py-2.5 shrink-0"
              style={{ background:'#1C3D5A', fontFamily:'Inter' }}>
              <span className="text-sm">📋</span>
              <span className="text-sm font-medium text-white flex-1 text-left" style={{ fontFamily:'Inter' }}>
                {myTasks.length} tâche{myTasks.length>1?'s':''} en attente pour toi
              </span>
              <span className="text-white text-sm">{showTasks?'▲':'▼'}</span>
            </button>
          )}

          {showTasks && (
            <div className="shrink-0 bg-white border-b border-gray-100 px-4 py-3">
              {myTasks.map(m => (
                <div key={m.id} className="flex items-center gap-2 mb-2">
                  <button onClick={() => completeTask(m.id)}>
                    <span className="text-xl" style={{ color:'#1C3D5A' }}>○</span>
                  </button>
                  <p className="text-sm flex-1" style={{ color:'#374151', fontFamily:'Inter' }}>{m.task.title}</p>
                  <span className="text-xs text-gray-400" style={{ fontFamily:'Inter' }}>de {m.authorName}</span>
                </div>
              ))}
            </div>
          )}

          {/* Messages list */}
          <div className="flex-1 overflow-y-auto scrollable px-4 py-4">
            {messages.length === 0 && (
              <div className="flex flex-col items-center justify-center h-full gap-3 pb-16">
                <span className="text-5xl">💬</span>
                <p className="font-display text-2xl font-semibold" style={{ color:'#1C3D5A' }}>Chat famille</p>
                <p className="text-sm text-gray-400 text-center max-w-xs" style={{ fontFamily:'Inter' }}>
                  Organisez le voyage ensemble. Assignez des tâches, partagez des idées.
                </p>
              </div>
            )}

            {messages.map(msg => {
              const isMe = msg.authorId === currentUser.id;
              return (
                <div key={msg.id} className={`flex mb-3 ${isMe ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[82%] flex flex-col gap-1 ${isMe ? 'items-end' : 'items-start'}`}>
                    {!isMe && (
                      <span className="text-[11px] font-semibold ml-1" style={{ color:msg.authorColor, fontFamily:'Inter' }}>
                        {msg.authorName}
                      </span>
                    )}
                    <div className={`rounded-2xl px-3.5 py-2.5 ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'}`}
                      style={{
                        background: isMe ? msg.authorColor : 'white',
                        border: msg.task ? `2px solid ${msg.authorColor}50` : 'none',
                        boxShadow: isMe ? 'none' : '0 1px 8px rgba(0,0,0,0.06)',
                      }}>
                      <p className="text-sm leading-relaxed" style={{ color: isMe ? 'white' : '#1A1A2E', fontFamily:'Inter' }}>
                        {msg.text}
                      </p>
                      {msg.task && (
                        <div className="mt-2 pt-2 flex items-center gap-2"
                          style={{ borderTop:`1px solid ${isMe ? 'rgba(255,255,255,0.25)' : '#E5E7EB'}` }}>
                          <button onClick={() => !msg.task.completed && completeTask(msg.id)} className="shrink-0">
                            {msg.task.completed
                              ? <span style={{ color: isMe ? 'rgba(255,255,255,0.85)' : '#2A6041', fontSize:18 }}>✅</span>
                              : <span style={{ color: isMe ? 'rgba(255,255,255,0.5)' : '#D1D5DB', fontSize:18 }}>⭕</span>
                            }
                          </button>
                          <div>
                            <p className="text-[11px]" style={{ color: isMe ? 'rgba(255,255,255,0.55)' : '#9CA3AF', fontFamily:'Inter' }}>
                              Pour {msg.task.assignedToName}
                            </p>
                            {msg.task.completed && <p className="text-[11px] font-semibold" style={{ color: isMe ? 'rgba(255,255,255,0.8)' : '#2A6041', fontFamily:'Inter' }}>✓ Fait !</p>}
                          </div>
                        </div>
                      )}
                    </div>
                    <span className="text-[10px] text-gray-400 mx-1" style={{ fontFamily:'Inter' }}>
                      {new Date(msg.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
                    </span>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>

          {/* Input area */}
          <div className="msg-bottom bg-white border-t border-gray-100 px-4 pt-3 shrink-0">
            {taskMode && (
              <div className="mb-2 p-2.5 rounded-xl" style={{ background:'#1C3D5A12' }}>
                <p className="text-xs font-semibold mb-2" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>Assigner à :</p>
                <div className="flex gap-2 flex-wrap">
                  {FAMILY.map(member => (
                    <button key={member.id}
                      onClick={() => setTaskAssignee(taskAssignee?.id === member.id ? null : member)}
                      className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium transition-all"
                      style={{
                        fontFamily: 'Inter',
                        background: taskAssignee?.id === member.id ? member.color : 'white',
                        color: taskAssignee?.id === member.id ? 'white' : '#374151',
                        border: `1px solid ${taskAssignee?.id === member.id ? member.color : '#E5E7EB'}`,
                      }}>
                      {member.emoji} {member.name}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="flex items-end gap-2 pb-2">
              <button onClick={() => { setTaskMode(!taskMode); setTaskAssignee(null); }}
                className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-all"
                style={{ background: taskMode ? '#1C3D5A' : '#F3F4F6' }}
                title="Créer une tâche">
                <span style={{ color: taskMode ? 'white' : '#6B7280' }}>📋</span>
              </button>

              <textarea
                value={text}
                onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                placeholder={taskMode ? 'Décrire la tâche…' : 'Message à la famille…'}
                rows={1}
                className="flex-1 rounded-2xl px-4 py-2.5 text-sm outline-none resize-none"
                style={{ background:'#F3F4F6', color:'#1A1A2E', fontFamily:'Inter', minHeight:38, maxHeight:112 }}
              />

              <button onClick={handleSend} disabled={!text.trim()}
                className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-all"
                style={{ background: text.trim() ? currentUser.color : '#E5E7EB', opacity: text.trim() ? 1 : 0.5 }}>
                <span className="text-sm">➤</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── APP SHELL ───────────────────────────────────────────────────────────

    const PAGE_TITLES = {
      map:    '🗺️  Carte du voyage',
      jours:  '📅  Itinéraire',
      hotels: '🏨  Nos hôtels',
      vols:   '✈️  Vols',
      chat:   '💬  Chat famille',
    };

    function AppShell() {
      const { page } = useApp();
      const isMap = page === 'map';

      const renderPage = () => {
        switch (page) {
          case 'map':    return <MapPage />;
          case 'jours':  return <TimelinePage />;
          case 'hotels': return <HotelsPage />;
          case 'vols':   return <FlightsPage />;
          case 'chat':   return <ChatPage />;
          default:       return <MapPage />;
        }
      };

      return (
        <div className="flex flex-col h-full safe-top">
          {!isMap && (
            <header className="shrink-0 px-5 h-14 flex items-center"
              style={{ background:'rgba(255,255,255,0.92)', backdropFilter:'blur(20px)', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
              <div className="flex items-center gap-2">
                <span className="text-xl">🌴</span>
                <div>
                  <p className="text-[11px] text-gray-400 uppercase tracking-wider leading-none mb-0.5" style={{ fontFamily:'Inter' }}>Sri Lanka 2026</p>
                  <h1 className="text-[15px] font-semibold leading-none" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>
                    {PAGE_TITLES[page] || ''}
                  </h1>
                </div>
              </div>
            </header>
          )}

          <main className="flex-1 overflow-hidden relative">
            <div key={page} className="h-full page-enter">
              {renderPage()}
            </div>
          </main>

          <BottomNav />
        </div>
      );
    }

    // ─── ROOT ────────────────────────────────────────────────────────────────

    function App() {
      const { isAuth, currentUser } = useApp();
      if (!isAuth || !currentUser) return <PasswordGate />;
      return <AppShell />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>
