    // ─── STATE ──────────────────────────────────────────────────────────────

    const AppContext = createContext(null);

    function loadLS(key, def) {
      try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch { return def; }
    }
    function saveLS(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

    function AppProvider({ children }) {
      const [isAuth, setIsAuth] = useState(() => loadLS('sl_auth', false));
      const [currentUser, setCurrentUser] = useState(() => loadLS('sl_user', null));
      const [messages, setMessages] = useState(() => loadLS('sl_msgs', []));
      const [page, setPage] = useState('map');

      const login = (pwd) => {
        if (pwd === TRIP_PASSWORD) {
          setIsAuth(true); saveLS('sl_auth', true); return true;
        }
        return false;
      };

      const chooseUser = (u) => { setCurrentUser(u); saveLS('sl_user', u); };

      const sendMessage = (msg) => {
        const m = { ...msg, id: crypto.randomUUID(), timestamp: Date.now() };
        setMessages(prev => {
          const next = [...prev, m];
          saveLS('sl_msgs', next);
          return next;
        });
      };

      const completeTask = (id) => {
        setMessages(prev => {
          const next = prev.map(m => m.id === id && m.task ? { ...m, task: { ...m.task, completed: true } } : m);
          saveLS('sl_msgs', next);
          return next;
        });
      };

      const logout = () => { setIsAuth(false); setCurrentUser(null); saveLS('sl_auth', false); saveLS('sl_user', null); };

      return (
        <AppContext.Provider value={{ isAuth, currentUser, messages, page, setPage, login, chooseUser, sendMessage, completeTask, logout }}>
          {children}
        </AppContext.Provider>
      );
    }

    const useApp = () => useContext(AppContext);

    function PasswordGate() {
      const { login, isAuth, chooseUser, currentUser } = useApp();

                🌴
              </div>
            </div>

            <h1 className="font-display text-5xl text-white text-center mb-1" style={{ fontWeight:600 }}>Sri Lanka</h1>
            <p className="text-center text-sm mb-10" style={{ color:'rgba(255,255,255,0.5)', letterSpacing:'0.12em', fontFamily:'Inter', textTransform:'uppercase' }}>
              Été 2026 · Voyage en famille
            </p>

            <div className={`relative mb-3 transition-all ${shake ? 'animate-bounce' : ''}`}
              style={{ animation: shake ? 'shake 0.4s ease' : '' }}>
              <div className={`flex items-center gap-3 rounded-2xl px-4 h-14 transition-all`}
                style={{ background: err ? 'rgba(239,68,68,0.12)' : 'rgba(255,255,255,0.1)', border: `1.5px solid ${err ? 'rgba(239,68,68,0.6)' : 'rgba(255,255,255,0.2)'}`, backdropFilter: 'blur(8px)' }}>
                <span style={{ color:'rgba(255,255,255,0.5)' }}>🔒</span>
                <input
                  type={show ? 'text' : 'password'}
                  value={pwd}
                  onChange={e => { setPwd(e.target.value); setErr(false); }}
                  onKeyDown={e => e.key === 'Enter' && handleLogin()}
                  placeholder="Mot de passe"
                  className="flex-1 bg-transparent outline-none text-base"
                  style={{ color:'white', fontFamily:'Inter', caretColor:'#C8923A' }}
                  autoComplete="current-password"
                />
                <button onClick={() => setShow(!show)} style={{ color:'rgba(255,255,255,0.5)', padding:'4px' }}>

    // ─── MAP PAGE ────────────────────────────────────────────────────────────

    function MapPage() {
      const mapRef = useRef(null);
      const leafletRef = useRef(null);
      const markersRef = useRef([]);
      const [selectedDay, setSelectedDay] = useState(null);

      const days = TRIP.days;
      const selected = days.find(d => d.number === selectedDay);

      useEffect(() => {
        if (!mapRef.current || leafletRef.current) return;

        const map = L.map(mapRef.current, { zoomControl:false, attributionControl:false });
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '© OpenStreetMap © CARTO', maxZoom: 19
        }).addTo(map);
        map.setView([7.5, 80.7], 7);
        leafletRef.current = map;

        // Route polyline
        const route = days.map(d => d.coordinates);
        L.polyline(route, { color:'#C8923A', weight:2.5, dashArray:'6 8', opacity:0.7 }).addTo(map);

        // Day markers
        days.forEach((day, idx) => {
          const color = DAY_COLORS[idx] || '#1C3D5A';
          const icon = L.divIcon({
            className: '',
            html: `<div class="day-marker" style="background:${color};width:30px;height:30px;font-size:12px">${day.number}</div>`,
            iconSize: [30, 30], iconAnchor: [15, 15]
          });
          const marker = L.marker(day.coordinates, { icon }).addTo(map);
          marker.on('click', () => setSelectedDay(day.number));
          markersRef.current.push({ marker, day: day.number });
        });

        return () => { map.remove(); leafletRef.current = null; markersRef.current = []; };
      }, []);

      // Fly to selected day
      useEffect(() => {
        if (!leafletRef.current || !selected) return;
        leafletRef.current.flyTo(selected.coordinates, 10, { duration: 1 });
        // Update marker sizes
        markersRef.current.forEach(({ marker, day: dn }) => {
          const idx = dn - 1;
          const color = DAY_COLORS[idx] || '#1C3D5A';
          const active = dn === selectedDay;
          const icon = L.divIcon({
            className: '',
            html: `<div class="day-marker" style="background:${color};width:${active?38:30}px;height:${active?38:30}px;font-size:${active?14:12}px">${dn}</div>`,
            iconSize: [active?38:30, active?38:30], iconAnchor: [(active?38:30)/2, (active?38:30)/2]
          });
          marker.setIcon(icon);
        });
      }, [selectedDay]);

      return (
        <div className="h-full relative">
          <div ref={mapRef} className="h-full w-full" />

          {/* Selected day panel */}
          {selected ? (
            <div className="absolute bottom-0 left-0 right-0 z-10 rounded-t-3xl p-5 pb-4" style={{ background:'white', boxShadow:'0 -4px 30px rgba(0,0,0,0.12)' }}>
              <div className="flex items-start justify-between mb-3">
                <div>
                  <p className="text-[11px] text-gray-400 uppercase tracking-wider" style={{ fontFamily:'Inter' }}>
                    Jour {selected.number} · {new Date(selected.date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})}
                  </p>
                  <h2 className="font-display text-2xl font-semibold leading-tight" style={{ color:'#1C3D5A' }}>
                    {selected.title}
                  </h2>
                </div>
                <button onClick={() => setSelectedDay(null)}
                  className="w-8 h-8 rounded-full flex items-center justify-center text-sm"
                  style={{ background:'#F3F4F6', color:'#6B7280' }}>✕</button>
              </div>
              <div className="flex gap-2 flex-wrap">
                {selected.activities.map(a => {
                  const m = ACTIVITY[a.type];
                  return (
                    <span key={a.id} className="inline-flex items-center gap-1 text-xs font-medium px-2.5 py-1 rounded-full"
                      style={{ fontFamily:'Inter', border:`1px solid ${m.color}40`, color:m.color, background:m.color+'12' }}>
                      {m.icon} {a.title}
                    </span>
                  );
                })}
              </div>
            </div>
          ) : (
            <div className="absolute bottom-0 left-0 right-0 z-10 p-3">
              <div className="rounded-2xl p-3" style={{ background:'rgba(255,255,255,0.92)', backdropFilter:'blur(12px)', boxShadow:'0 4px 20px rgba(0,0,0,0.08)' }}>
                <p className="text-[11px] text-gray-400 text-center uppercase tracking-wider mb-2" style={{ fontFamily:'Inter' }}>
                  Toucher un marqueur
                </p>
                <div className="flex gap-2 overflow-x-auto scrollable pb-1">
                  {days.map((d, idx) => (
                    <button key={d.number} onClick={() => setSelectedDay(d.number)}
                      className="shrink-0 flex flex-col items-center gap-1 px-3 py-2 rounded-xl"
                      style={{ background:'#F9FAFB', border:'1px solid #E5E7EB' }}>
                      <span className="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold"
                        style={{ background: DAY_COLORS[idx], fontFamily:'Inter' }}>
                        {d.number}
                      </span>
                      <span className="text-[10px] text-gray-400 whitespace-nowrap" style={{ fontFamily:'Inter' }}>{d.location}</span>
                    </button>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

            </div>

            <div className="flex flex-wrap gap-2">
              <span className="text-xs px-3 py-1 rounded-full" style={{ color:'#1C3D5A', background:'#1C3D5A18', fontFamily:'Inter' }}>
                ✈️ {flight.flightNumber}
              </span>
              {flight.notes && <span className="text-xs px-3 py-1 rounded-full" style={{ color:'#6B7280', background:'#F3F4F6', fontFamily:'Inter' }}>ℹ️ {flight.notes}</span>}
            </div>
          </div>
        </div>
      );
    }

    // ─── CHAT PAGE ───────────────────────────────────────────────────────────

    function ChatPage() {
      const { messages, sendMessage, completeTask, currentUser } = useApp();
      const [text, setText] = useState('');
      const [taskMode, setTaskMode] = useState(false);
      const [taskAssignee, setTaskAssignee] = useState(null);
      const [showTasks, setShowTasks] = useState(false);
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior:'smooth' });
      }, [messages]);

      const myTasks = messages.filter(m => m.task && !m.task.completed && m.task.assignedToId === currentUser?.id);

      const handleSend = () => {
        const t = text.trim();
        if (!t || !currentUser) return;
        sendMessage({
          authorId: currentUser.id,
          authorName: currentUser.name,
          authorColor: currentUser.color,
          text: t,
          ...(taskMode && taskAssignee ? { task: { assignedToId: taskAssignee.id, assignedToName: taskAssignee.name, title: t, completed: false } } : {})
        });
        setText('');
        setTaskMode(false);
        setTaskAssignee(null);
      };

      if (!currentUser) return null;

      return (
        <div className="flex flex-col h-full" style={{ background:'#F9F4EC' }}>

          {/* My tasks banner */}
          {myTasks.length > 0 && (
            <button onClick={() => setShowTasks(!showTasks)}
              className="flex items-center gap-2 px-4 py-2.5 shrink-0"
              style={{ background:'#1C3D5A', fontFamily:'Inter' }}>
              <span className="text-sm">📋</span>
              <span className="text-sm font-medium text-white flex-1 text-left" style={{ fontFamily:'Inter' }}>
                {myTasks.length} tâche{myTasks.length>1?'s':''} en attente pour toi
              </span>
              <span className="text-white text-sm">{showTasks?'▲':'▼'}</span>
            </button>
          )}

          {showTasks && (
            <div className="shrink-0 bg-white border-b border-gray-100 px-4 py-3">
              {myTasks.map(m => (
                <div key={m.id} className="flex items-center gap-2 mb-2">
                  <button onClick={() => completeTask(m.id)}>
                    <span className="text-xl" style={{ color:'#1C3D5A' }}>○</span>
                  </button>
                  <p className="text-sm flex-1" style={{ color:'#374151', fontFamily:'Inter' }}>{m.task.title}</p>
                  <span className="text-xs text-gray-400" style={{ fontFamily:'Inter' }}>de {m.authorName}</span>
                </div>
              ))}
            </div>
          )}

          {/* Messages list */}
          <div className="flex-1 overflow-y-auto scrollable px-4 py-4">
            {messages.length === 0 && (
              <div className="flex flex-col items-center justify-center h-full gap-3 pb-16">
                <span className="text-5xl">💬</span>
                <p className="font-display text-2xl font-semibold" style={{ color:'#1C3D5A' }}>Chat famille</p>
                <p className="text-sm text-gray-400 text-center max-w-xs" style={{ fontFamily:'Inter' }}>
                  Organisez le voyage ensemble. Assignez des tâches, partagez des idées.
                </p>
              </div>
            )}

            {messages.map(msg => {
              const isMe = msg.authorId === currentUser.id;
              return (
                <div key={msg.id} className={`flex mb-3 ${isMe ? 'justify-end' : 'justify-start'}`}>
                  <div className={`max-w-[82%] flex flex-col gap-1 ${isMe ? 'items-end' : 'items-start'}`}>
                    {!isMe && (
                      <span className="text-[11px] font-semibold ml-1" style={{ color:msg.authorColor, fontFamily:'Inter' }}>
                        {msg.authorName}
                      </span>
                    )}
                    <div className={`rounded-2xl px-3.5 py-2.5 ${isMe ? 'rounded-tr-sm' : 'rounded-tl-sm'}`}
                      style={{
                        background: isMe ? msg.authorColor : 'white',
                        border: msg.task ? `2px solid ${msg.authorColor}50` : 'none',
                        boxShadow: isMe ? 'none' : '0 1px 8px rgba(0,0,0,0.06)',
                      }}>
                      <p className="text-sm leading-relaxed" style={{ color: isMe ? 'white' : '#1A1A2E', fontFamily:'Inter' }}>
                        {msg.text}
                      </p>
                      {msg.task && (
                        <div className="mt-2 pt-2 flex items-center gap-2"
                          style={{ borderTop:`1px solid ${isMe ? 'rgba(255,255,255,0.25)' : '#E5E7EB'}` }}>
                          <button onClick={() => !msg.task.completed && completeTask(msg.id)} className="shrink-0">
                            {msg.task.completed
                              ? <span style={{ color: isMe ? 'rgba(255,255,255,0.85)' : '#2A6041', fontSize:18 }}>✅</span>
                              : <span style={{ color: isMe ? 'rgba(255,255,255,0.5)' : '#D1D5DB', fontSize:18 }}>⭕</span>
                            }
                          </button>
                          <div>
                            <p className="text-[11px]" style={{ color: isMe ? 'rgba(255,255,255,0.55)' : '#9CA3AF', fontFamily:'Inter' }}>
                              Pour {msg.task.assignedToName}
                            </p>
                            {msg.task.completed && <p className="text-[11px] font-semibold" style={{ color: isMe ? 'rgba(255,255,255,0.8)' : '#2A6041', fontFamily:'Inter' }}>✓ Fait !</p>}
                          </div>
                        </div>
                      )}
                    </div>
                    <span className="text-[10px] text-gray-400 mx-1" style={{ fontFamily:'Inter' }}>
                      {new Date(msg.timestamp).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}
                    </span>
                  </div>
                </div>
              );
            })}
            <div ref={bottomRef} />
          </div>

          {/* Input area */}
          <div className="msg-bottom bg-white border-t border-gray-100 px-4 pt-3 shrink-0">
            {taskMode && (
              <div className="mb-2 p-2.5 rounded-xl" style={{ background:'#1C3D5A12' }}>
                <p className="text-xs font-semibold mb-2" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>Assigner à :</p>
                <div className="flex gap-2 flex-wrap">
                  {FAMILY.map(member => (
                    <button key={member.id}
                      onClick={() => setTaskAssignee(taskAssignee?.id === member.id ? null : member)}
                      className="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium transition-all"
                      style={{
                        fontFamily: 'Inter',
                        background: taskAssignee?.id === member.id ? member.color : 'white',
                        color: taskAssignee?.id === member.id ? 'white' : '#374151',
                        border: `1px solid ${taskAssignee?.id === member.id ? member.color : '#E5E7EB'}`,
                      }}>
                      {member.emoji} {member.name}
                    </button>
                  ))}
                </div>
              </div>
            )}

            <div className="flex items-end gap-2 pb-2">
              <button onClick={() => { setTaskMode(!taskMode); setTaskAssignee(null); }}
                className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-all"
                style={{ background: taskMode ? '#1C3D5A' : '#F3F4F6' }}
                title="Créer une tâche">
                <span style={{ color: taskMode ? 'white' : '#6B7280' }}>📋</span>
              </button>

              <textarea
                value={text}
                onChange={e => setText(e.target.value)}
                onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }}
                placeholder={taskMode ? 'Décrire la tâche…' : 'Message à la famille…'}
                rows={1}
                className="flex-1 rounded-2xl px-4 py-2.5 text-sm outline-none resize-none"
                style={{ background:'#F3F4F6', color:'#1A1A2E', fontFamily:'Inter', minHeight:38, maxHeight:112 }}
              />

              <button onClick={handleSend} disabled={!text.trim()}
                className="w-9 h-9 rounded-full flex items-center justify-center shrink-0 transition-all"
                style={{ background: text.trim() ? currentUser.color : '#E5E7EB', opacity: text.trim() ? 1 : 0.5 }}>
                <span className="text-sm">➤</span>
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── APP SHELL ───────────────────────────────────────────────────────────

    const PAGE_TITLES = {
      map:    '🗺️  Carte du voyage',
      jours:  '📅  Itinéraire',
      hotels: '🏨  Nos hôtels',
      vols:   '✈️  Vols',
      chat:   '💬  Chat famille',
    };

    function AppShell() {
      const { page } = useApp();
      const isMap = page === 'map';

      const renderPage = () => {
        switch (page) {
          case 'map':    return <MapPage />;
          case 'jours':  return <TimelinePage />;
          case 'hotels': return <HotelsPage />;
          case 'vols':   return <FlightsPage />;
          case 'chat':   return <ChatPage />;
          default:       return <MapPage />;
        }
      };

      return (
        <div className="flex flex-col h-full safe-top">
          {!isMap && (
            <header className="shrink-0 px-5 h-14 flex items-center"
              style={{ background:'rgba(255,255,255,0.92)', backdropFilter:'blur(20px)', borderBottom:'1px solid rgba(0,0,0,0.06)' }}>
              <div className="flex items-center gap-2">
                <span className="text-xl">🌴</span>
                <div>
                  <p className="text-[11px] text-gray-400 uppercase tracking-wider leading-none mb-0.5" style={{ fontFamily:'Inter' }}>Sri Lanka 2026</p>
                  <h1 className="text-[15px] font-semibold leading-none" style={{ color:'#1C3D5A', fontFamily:'Inter' }}>
                    {PAGE_TITLES[page] || ''}
                  </h1>
                </div>
              </div>
            </header>
          )}

          <main className="flex-1 overflow-hidden relative">
            <div key={page} className="h-full page-enter">
              {renderPage()}
            </div>
          </main>

          <BottomNav />
        </div>
      );
    }

    // ─── ROOT ────────────────────────────────────────────────────────────────

    function App() {
      const { isAuth, currentUser } = useApp();
      if (!isAuth || !currentUser) return <PasswordGate />;
      return <AppShell />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(
      <AppProvider>
        <App />
      </AppProvider>
    );
  </script>
</body>
</html>
